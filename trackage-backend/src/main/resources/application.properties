spring.application.name=trackage-backend

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ExpenseTracking}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:@Qwerty7}
spring.datasource.hikari.maximum-pool-size=10

# JPA (Flyway owns the schema; Hibernate only validates it matches)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.default_schema=public

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Server
server.port=8080

# JWT
# No default on purpose: if JWT_SECRET isn't set, Spring fails to start with a
# clear "could not resolve placeholder" error, instead of silently signing
# tokens with a value anyone can read in this public repo.
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-ttl-minutes=${JWT_ACCESS_TTL_MINUTES:15}
app.jwt.refresh-token-ttl-days=${JWT_REFRESH_TTL_DAYS:30}

# CORS
app.cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:5173}

# Mail / OTP
# app.otp.mode=console logs the code instead of emailing it (no SMTP account needed for local dev).
# Set OTP_MODE=smtp once SMTP_* below are configured with real credentials.
app.otp.mode=${OTP_MODE:console}
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${SMTP_HOST:smtp.gmail.com}
